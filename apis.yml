description: Mixedbread is a Berlin-based AI search and retrieval platform. It provides embeddings (mxbai-embed,
  Wholembed v3), rerankers (mxbai-rerank v1/v2/v3-listwise), multimodal stores, document parsing, structured
  extraction, and connector-based ingestion. Models are published as open weights on Hugging Face and consumed
  via a hosted REST API at api.mixedbread.com. The platform powers RAG and agent retrieval over text, PDFs, images,
  audio, and video across 100+ languages.
