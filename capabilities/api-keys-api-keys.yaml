naftiko: 1.0.0-alpha2
info:
  label: Mixedbread API Keys
  description: 'Mixedbread API Keys. 7 operations. Self-contained Naftiko capability covering one Mixedbread business surface.'
  tags:
    - Mixedbread
    - Api
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      MXBAI_API_KEY: MXBAI_API_KEY
capability:
  consumes:
    - type: http
      namespace: api-keys-api-keys
      baseUri: https://api.mixedbread.com
      description: Mixedbread API Keys business capability. Self-contained, no shared references.
      resources:
        - name: v1-api-keys
          path: /v1/api-keys
          operations:
            - name: createapikey
              method: POST
              description: Create API key
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
        - name: v1-api-keys-2
          path: /v1/api-keys
          operations:
            - name: listapikeys
              method: GET
              description: List API keys
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
        - name: v1-api-keys-3
          path: /v1/api-keys/{api_key_id}
          operations:
            - name: getapikey
              method: GET
              description: Get API key details
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
        - name: v1-api-keys-4
          path: /v1/api-keys/{api_key_id}
          operations:
            - name: updateapikey
              method: PATCH
              description: Update API key
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
        - name: v1-api-keys-5
          path: /v1/api-keys/{api_key_id}
          operations:
            - name: deleteapikey
              method: DELETE
              description: Delete API key
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
        - name: v1-api-keys-revoke
          path: /v1/api-keys/{api_key_id}/revoke
          operations:
            - name: revokeapikey
              method: POST
              description: Revoke API key
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
        - name: v1-api-keys-reroll
          path: /v1/api-keys/{api_key_id}/reroll
          operations:
            - name: rerollapikey
              method: POST
              description: Reroll API key
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
      authentication:
        type: apikey
        key: authorization
        value: 'Bearer {{env.MXBAI_API_KEY}}'
        placement: header
  exposes:
    - type: rest
      namespace: api-keys-api-keys-rest
      port: 8080
      description: REST adapter for Mixedbread API Keys. One Spectral-compliant resource per consumed operation, prefixed with /v1.
      resources: []
