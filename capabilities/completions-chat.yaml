naftiko: 1.0.0-alpha2
info:
  label: Mixedbread Chat Completions — Chat
  description: 'Mixedbread Chat Completions — Chat. 1 operations. Self-contained Naftiko capability covering one Mixedbread business surface.'
  tags:
    - Mixedbread
    - Completions
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      MXBAI_API_KEY: MXBAI_API_KEY
capability:
  consumes:
    - type: http
      namespace: completions-chat
      baseUri: https://api.mixedbread.com
      description: Mixedbread Chat Completions — Chat business capability. Self-contained, no shared references.
      resources:
        - name: v1-chat-completions
          path: /v1/chat/completions
          operations:
            - name: createchatcompletion
              method: POST
              description: Create a chat completion
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
      authentication:
        type: apikey
        key: authorization
        value: 'Bearer {{env.MXBAI_API_KEY}}'
        placement: header
  exposes:
    - type: rest
      namespace: completions-chat-rest
      port: 8080
      description: REST adapter for Mixedbread Chat Completions — Chat. One Spectral-compliant resource per consumed operation, prefixed with /v1.
      resources: []
