naftiko: 1.0.0-alpha2
info:
  label: Mixedbread Files — Files
  description: 'Mixedbread Files — Files. 6 operations. Self-contained Naftiko capability covering one Mixedbread business surface.'
  tags:
    - Mixedbread
    - Files
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
