      description: Mixedbread Files — Files business capability. Self-contained, no shared references.
      resources:
        - name: v1-files
          path: /v1/files
          operations:
            - name: uploadfile
              method: POST
              description: Upload file
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
        - name: v1-files-2
          path: /v1/files
          operations:
            - name: listfiles
              method: GET
              description: List files
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
        - name: v1-files-3
          path: /v1/files/{file_id}
          operations:
            - name: getfile
              method: GET
              description: Get file details
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
        - name: v1-files-4
          path: /v1/files/{file_id}
          operations:
            - name: updatefile
              method: POST
              description: Update file
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
        - name: v1-files-5
          path: /v1/files/{file_id}
          operations:
            - name: deletefile
              method: DELETE
              description: Delete file
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Request body (JSON).
                  required: false
        - name: v1-files-content
          path: /v1/files/{file_id}/content
          operations:
            - name: downloadfile
              method: GET
              description: Download file
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
