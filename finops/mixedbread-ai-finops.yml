specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Mixedbread
providerId: mixedbread-ai
created: '2026-05-25'
modified: '2026-05-25'
reconciled: true
tags:
  - FinOps
  - Cost Management
  - FOCUS
  - AI
  - Embeddings
  - Search
description: FOCUS-aligned FinOps definition for the Mixedbread platform. Token-based metering for indexing,
  query-based metering for search, and token-month metering for storage. Separate workspace subscription line.
sources:
  - https://www.mixedbread.com/pricing
  - https://www.mixedbread.com/api-reference
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Mixedbread
serviceCategory: AI and Machine Learning
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Credit
    - Adjustment
  primaryUnit: token
  secondaryUnits:
    - query
    - workspace
focusColumns:
  ServiceName: Mixedbread Platform
  ServiceCategory: AI and Machine Learning
  ProviderName: Mixedbread
  PublisherName: Mixedbread
  InvoiceIssuerName: Mixedbread
  PricingCategory: Usage-Based
  PricingUnit: MTok
  BillingCurrency: USD
meters:
  - name: index_fast_tokens
    unit: token
    aggregation: sum
    dimensions:
      - store_id
      - workspace_id
    skuPriceUSDPerMillion: 1.50
  - name: index_high_quality_tokens
    unit: token
    aggregation: sum
    dimensions:
      - store_id
      - workspace_id
    skuPriceUSDPerMillion: 3.00
  - name: search_basic_queries
    unit: query
    aggregation: sum
    dimensions:
      - store_id
      - workspace_id
    skuPriceUSDPerThousand: 4.00
  - name: search_rerank_queries
    unit: query
    aggregation: sum
    dimensions:
      - store_id
      - workspace_id
    skuPriceUSDPerThousand: 7.50
  - name: search_agentic_queries
    unit: query
    aggregation: sum
    dimensions:
      - store_id
      - workspace_id
    skuPriceUSDPerThousand: 20.00
  - name: storage_token_months
    unit: token-month
    aggregation: sum
    dimensions:
      - store_id
      - workspace_id
    skuPriceUSDPerMillionPerMonth: 0.50
  - name: workspace_subscription
    unit: workspace-month
    aggregation: sum
    dimensions:
      - workspace_id
      - plan
discounts:
  - name: Starter free credit
    type: included_credit
    amountUSD: 5
    frequency: one-time
  - name: Scale included credit
    type: included_credit
    amountUSD: 20
    frequency: monthly
  - name: Startup Program credit
    type: promotional
    amountUSD: 250
    frequency: one-time
endpoints:
  billingSummary: GET /v1/billing/summary
  perStoreCosts: GET /v1/billing/stores
  storeCostHistogram: GET /v1/billing/stores/{store_id}/costs/histogram
  parsingCostHistogram: GET /v1/billing/parsing/costs/histogram
notes:
  - The Mixedbread Billing API is the canonical source for FOCUS export reconciliation.
  - Indexing and storage are token-metered; search is query-metered; storage adds a per-token-month dimension.
  - Enterprise contracts may override per-meter SKU prices with negotiated rates.
